<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pentaclub — Wildrift and Riftbound TCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#060a10;
  --bg-primary:#0b1120;
  --bg-surface:#111b2e;
  --bg-card:#152238;
  --bg-card-hover:#1a2a45;
  --bg-elevated:#1e3350;
  --accent:#00e68a;
  --accent-dim:#00b36b;
  --accent-glow:rgba(0,230,138,0.15);
  --accent-glow-strong:rgba(0,230,138,0.3);
  --accent-secondary:#00c4ff;
  --accent-tertiary:#a855f7;
  --text-primary:#e8ecf4;
  --text-secondary:#8c99b0;
  --text-muted:#566380;
  --border:#1e2d48;
  --border-light:#2a3d5c;
  --danger:#ff4757;
  --warning:#ffa726;
  --font-display:'Outfit',sans-serif;
  --font-body:'Outfit',sans-serif;
  --font-accent:'Crimson Pro',serif;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --radius-xl:24px;
  --transition-fast:0.15s ease;
  --transition-med:0.3s cubic-bezier(0.4,0,0.2,1);
  --transition-slow:0.5s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg-deep);
  color:var(--text-primary);
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{max-width:100%;display:block}
.app{position:relative}

/* ========== ANIMATED BACKGROUND ========== */
.bg-mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%,rgba(0,230,138,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%,rgba(0,196,255,0.03) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(168,85,247,0.02) 0%,transparent 60%);
}
.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(30,45,72,0.3) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,45,72,0.3) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 30%,black 0%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 30%,black 0%,transparent 100%);
  opacity:0.4;
}

/* ========== NAV ========== */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 clamp(1rem,4vw,3rem);
  height:72px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,10,16,0.8);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid rgba(30,45,72,0.5);
  transition:background var(--transition-med);
}
.nav.scrolled{background:rgba(6,10,16,0.95)}
.nav__logo{display:flex;align-items:center;gap:10px}
.nav__logo-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--accent),var(--accent-secondary));
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:16px;color:var(--bg-deep);
  position:relative;overflow:hidden;
}
.nav__logo-icon::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.2) 50%,transparent 60%);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
.nav__logo-text{
  font-weight:700;font-size:20px;letter-spacing:-0.02em;
  background:linear-gradient(135deg,var(--text-primary),var(--text-secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav__links{display:flex;gap:6px;align-items:center}
.nav__link{
  padding:8px 16px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:500;color:var(--text-secondary);
  transition:all var(--transition-fast);position:relative;
}
.nav__link:hover,.nav__link.active{color:var(--text-primary)}
.nav__link.active::after{
  content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:16px;height:2px;background:var(--accent);border-radius:1px;
}
.nav__cta{
  padding:8px 20px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;
  background:var(--accent);color:var(--bg-deep);
  transition:all var(--transition-fast);
}
.nav__cta:hover{background:#00ff99;box-shadow:0 0 20px var(--accent-glow)}
.nav__mobile-toggle{display:none;width:32px;height:32px;flex-direction:column;justify-content:center;gap:5px}
.nav__mobile-toggle span{display:block;height:2px;background:var(--text-primary);border-radius:1px;transition:all var(--transition-fast)}

/* ========== HERO ========== */
.hero{
  position:relative;z-index:1;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:120px clamp(1rem,4vw,3rem) 80px;
  overflow:hidden;
}
.hero__content{
  max-width:900px;text-align:center;
  animation:heroFadeIn 1s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes heroFadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.hero__badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:999px;
  background:var(--accent-glow);border:1px solid rgba(0,230,138,0.2);
  font-size:13px;font-weight:500;color:var(--accent);
  margin-bottom:28px;
  animation:heroFadeIn 1s cubic-bezier(0.4,0,0.2,1) 0.1s both;
}
.hero__badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
.hero__title{
  font-size:clamp(2.5rem,6vw,4.5rem);
  font-weight:800;line-height:1.05;letter-spacing:-0.03em;
  margin-bottom:24px;
  animation:heroFadeIn 1s cubic-bezier(0.4,0,0.2,1) 0.2s both;
}
.hero__title-accent{
  background:linear-gradient(135deg,var(--accent),var(--accent-secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero__subtitle{
  font-size:clamp(1rem,2vw,1.2rem);
  color:var(--text-secondary);
  max-width:580px;margin:0 auto 40px;
  line-height:1.7;font-weight:300;
  animation:heroFadeIn 1s cubic-bezier(0.4,0,0.2,1) 0.3s both;
}
.hero__actions{
  display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  animation:heroFadeIn 1s cubic-bezier(0.4,0,0.2,1) 0.4s both;
}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 28px;border-radius:var(--radius-md);
  font-size:15px;font-weight:600;
  transition:all var(--transition-med);
  position:relative;overflow:hidden;
}
.btn--primary{
  background:var(--accent);color:var(--bg-deep);
}
.btn--primary:hover{
  background:#00ff99;
  box-shadow:0 4px 30px var(--accent-glow-strong),0 0 60px var(--accent-glow);
  transform:translateY(-2px);
}
.btn--secondary{
  background:var(--bg-surface);color:var(--text-primary);
  border:1px solid var(--border-light);
}
.btn--secondary:hover{
  background:var(--bg-card);border-color:var(--accent);
  box-shadow:0 0 20px var(--accent-glow);
  transform:translateY(-2px);
}
.hero__particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.hero__particle{
  position:absolute;border-radius:50%;
  animation:float linear infinite;
  background:var(--accent);
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-20vh) scale(1);opacity:0}
}

/* ========== SECTIONS COMMON ========== */
.section{
  position:relative;z-index:1;
  padding:100px clamp(1rem,4vw,3rem);
}
.section__header{text-align:center;margin-bottom:60px}
.section__label{
  display:inline-block;
  font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.15em;
  color:var(--accent);margin-bottom:12px;
}
.section__title{
  font-size:clamp(1.75rem,4vw,2.75rem);
  font-weight:700;line-height:1.15;letter-spacing:-0.02em;
}
.section__desc{
  font-size:16px;color:var(--text-secondary);
  max-width:560px;margin:16px auto 0;font-weight:300;
}

/* ========== STATS ========== */
.stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:1px;background:var(--border);border-radius:var(--radius-lg);overflow:hidden;
  max-width:900px;margin:0 auto;
}
.stat{
  background:var(--bg-surface);padding:32px 24px;text-align:center;
  transition:background var(--transition-fast);
}
.stat:hover{background:var(--bg-card)}
.stat__value{
  font-size:clamp(1.5rem,3vw,2.25rem);font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent-secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.2;
}
.stat__label{font-size:13px;color:var(--text-muted);margin-top:6px;font-weight:500}

/* ========== FEATURES ========== */
.features-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;max-width:1100px;margin:0 auto;
}
.feature-card{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:32px 28px;
  transition:all var(--transition-med);
  position:relative;overflow:hidden;
}
.feature-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity var(--transition-med);
}
.feature-card:hover{
  background:var(--bg-card);border-color:var(--border-light);
  transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(0,0,0,0.3);
}
.feature-card:hover::before{opacity:1}
.feature-card__icon{
  width:48px;height:48px;border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;font-size:22px;
}
.feature-card__icon--green{background:rgba(0,230,138,0.1);color:var(--accent)}
.feature-card__icon--blue{background:rgba(0,196,255,0.1);color:var(--accent-secondary)}
.feature-card__icon--purple{background:rgba(168,85,247,0.1);color:var(--accent-tertiary)}
.feature-card__title{font-size:18px;font-weight:600;margin-bottom:10px}
.feature-card__desc{font-size:14px;color:var(--text-secondary);line-height:1.7;font-weight:300}

/* ========== CARD PREVIEW ========== */
.card-showcase{
  max-width:1100px;margin:0 auto;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}
.tcg-card{
  position:relative;border-radius:var(--radius-lg);overflow:hidden;
  background:var(--bg-card);border:1px solid var(--border);
  transition:all var(--transition-med);
  cursor:pointer;
  aspect-ratio:3/4.2;
}
.tcg-card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 30px var(--accent-glow);
  border-color:var(--accent);
}
.tcg-card__art{
  width:100%;height:65%;
  position:relative;overflow:hidden;
}
.tcg-card__art-bg{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform var(--transition-slow);
}
.tcg-card:hover .tcg-card__art-bg{transform:scale(1.08)}
.tcg-card__rarity{
  position:absolute;top:10px;right:10px;
  padding:3px 10px;border-radius:999px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;
}
.tcg-card__rarity--legendary{
  background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0a00;
}
.tcg-card__rarity--epic{
  background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;
}
.tcg-card__rarity--rare{
  background:linear-gradient(135deg,#00c4ff,#0088cc);color:#001a2e;
}
.tcg-card__rarity--common{
  background:var(--bg-elevated);color:var(--text-secondary);
}
.tcg-card__info{padding:14px 16px}
.tcg-card__name{font-size:15px;font-weight:700;margin-bottom:4px}
.tcg-card__type{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:10px}
.tcg-card__stats-row{display:flex;gap:12px}
.tcg-card__stat{
  display:flex;align-items:center;gap:4px;
  font-size:12px;font-weight:600;
}
.tcg-card__stat--atk{color:#ff6b6b}
.tcg-card__stat--def{color:#4ecdc4}
.tcg-card__stat--mana{color:#a855f7}
.tcg-card__mana-cost{
  position:absolute;top:10px;left:10px;
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,rgba(168,85,247,0.9),rgba(124,58,237,0.9));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
  box-shadow:0 2px 8px rgba(168,85,247,0.4);
}

/* ========== CTA ========== */
.cta-section{
  max-width:900px;margin:0 auto;
  background:linear-gradient(135deg,var(--bg-surface),var(--bg-card));
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:60px 40px;text-align:center;
  position:relative;overflow:hidden;
}
.cta-section::before{
  content:'';position:absolute;
  top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg at 50% 50%,transparent,var(--accent-glow),transparent,rgba(0,196,255,0.05),transparent);
  animation:rotateBg 12s linear infinite;
  opacity:0.5;
}
@keyframes rotateBg{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.cta-section__inner{position:relative;z-index:1}
.cta-section__title{font-size:clamp(1.5rem,3vw,2.25rem);font-weight:700;margin-bottom:14px}
.cta-section__desc{font-size:16px;color:var(--text-secondary);margin-bottom:32px;font-weight:300}

/* ========== FOOTER ========== */
.footer{
  position:relative;z-index:1;
  padding:60px clamp(1rem,4vw,3rem) 32px;
  border-top:1px solid var(--border);
}
.footer__inner{
  max-width:1100px;margin:0 auto;
  display:grid;grid-template-columns:2fr repeat(3,1fr);
  gap:40px;
}
.footer__brand-desc{font-size:13px;color:var(--text-muted);margin-top:12px;line-height:1.7;max-width:260px}
.footer__col-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-secondary);margin-bottom:16px}
.footer__link{display:block;font-size:14px;color:var(--text-muted);padding:4px 0;transition:color var(--transition-fast)}
.footer__link:hover{color:var(--accent)}
.footer__bottom{
  max-width:1100px;margin:40px auto 0;
  padding-top:24px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--text-muted);
}

/* ========== PAGE TRANSITIONS ========== */
.page{
  opacity:0;transform:translateY(16px);
  transition:opacity 0.4s ease,transform 0.4s ease;
  min-height:calc(100vh - 72px);padding-top:72px;
}
.page.active{opacity:1;transform:translateY(0)}
.page:not(.active){display:none}

/* ========== STAGGER ANIMATIONS ========== */
.stagger-in{opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease}
.stagger-in.visible{opacity:1;transform:translateY(0)}

/* ========== RESPONSIVE ========== */
@media(max-width:768px){
  .nav__links{display:none}
  .nav__mobile-toggle{display:flex}
  .nav__links.open{
    display:flex;flex-direction:column;
    position:absolute;top:72px;left:0;right:0;
    background:rgba(6,10,16,0.98);
    padding:16px;border-bottom:1px solid var(--border);
  }
  .footer__inner{grid-template-columns:1fr 1fr}
  .hero__title{font-size:clamp(2rem,8vw,3rem)}
}
@media(max-width:480px){
  .footer__inner{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
}

/* ========== CARDS PAGE ========== */
.cards-toolbar{
  max-width:1100px;margin:0 auto 32px;
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
}
.cards-toolbar__search{
  flex:1;min-width:200px;
  padding:10px 16px 10px 40px;
  border-radius:var(--radius-md);
  background:var(--bg-surface);
  border:1px solid var(--border);
  color:var(--text-primary);
  font-family:inherit;font-size:14px;
  transition:border-color var(--transition-fast);
  outline:none;
}
.cards-toolbar__search:focus{border-color:var(--accent)}
.cards-toolbar__search::placeholder{color:var(--text-muted)}
.filter-btn{
  padding:8px 16px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;
  background:var(--bg-surface);border:1px solid var(--border);
  color:var(--text-secondary);
  transition:all var(--transition-fast);
}
.filter-btn:hover,.filter-btn.active{
  background:var(--accent-glow);border-color:var(--accent);
  color:var(--accent);
}
.empty-state{
  text-align:center;padding:80px 20px;
  color:var(--text-muted);font-size:16px;
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ============================================================
// RIFTBOUND TCG — TypeScript-style OOP SPA (compiled to ES6)
// All classes use strict OOP: encapsulation, inheritance, 
// composition, polymorphism, and dependency injection patterns.
// ============================================================

// ---------- MODELS ----------

class Card {
  constructor(id, name, type, rarity, manaCost, attack, defense, description, artGradient, set) {
    this.id = id;
    this.name = name;
    this.type = type;
    this.rarity = rarity;
    this.manaCost = manaCost;
    this.attack = attack;
    this.defense = defense;
    this.description = description;
    this.artGradient = artGradient;
    this.set = set;
  }
  get rarityClass() {
    return `tcg-card__rarity--${this.rarity.toLowerCase()}`;
  }
}

class CardCollection {
  #cards = [];
  constructor(cards = []) { this.#cards = cards; }
  get all() { return [...this.#cards]; }
  get count() { return this.#cards.length; }
  add(card) { this.#cards.push(card); }
  filterByRarity(rarity) {
    if (rarity === 'all') return this.all;
    return this.#cards.filter(c => c.rarity.toLowerCase() === rarity.toLowerCase());
  }
  filterByType(type) {
    if (type === 'all') return this.all;
    return this.#cards.filter(c => c.type.toLowerCase() === type.toLowerCase());
  }
  search(query) {
    const q = query.toLowerCase().trim();
    if (!q) return this.all;
    return this.#cards.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.type.toLowerCase().includes(q) ||
      c.description.toLowerCase().includes(q)
    );
  }
}

// ---------- ROUTER ----------

class Router {
  #routes = new Map();
  #currentRoute = '';
  #onNavigate = null;
  constructor(onNavigate) {
    this.#onNavigate = onNavigate;
    window.addEventListener('hashchange', () => this.#handleRoute());
  }
  register(path, handler) { this.#routes.set(path, handler); return this; }
  start() { this.#handleRoute(); return this; }
  navigate(path) {
    window.location.hash = path;
  }
  get current() { return this.#currentRoute; }
  #handleRoute() {
    const hash = window.location.hash.slice(1) || '/';
    this.#currentRoute = hash;
    if (this.#onNavigate) this.#onNavigate(hash);
    const handler = this.#routes.get(hash);
    if (handler) handler();
  }
}

// ---------- EVENT EMITTER ----------

class EventEmitter {
  #listeners = new Map();
  on(event, fn) {
    if (!this.#listeners.has(event)) this.#listeners.set(event, []);
    this.#listeners.get(event).push(fn);
  }
  emit(event, data) {
    (this.#listeners.get(event) || []).forEach(fn => fn(data));
  }
}

// ---------- ABSTRACT COMPONENT ----------

class Component {
  constructor(container) {
    this._container = container;
  }
  render() { throw new Error('render() must be implemented'); }
  mount() {
    this._container.innerHTML = this.render();
    this.afterMount();
  }
  afterMount() {}
  destroy() { this._container.innerHTML = ''; }
}

// ---------- NAV COMPONENT ----------

class NavComponent extends Component {
  #router;
  #mobileOpen = false;
  constructor(container, router) {
    super(container);
    this.#router = router;
  }
  render() {
    return `
      <nav class="nav" id="mainNav">
        <a href="#/" class="nav__logo">
          <div class="nav__logo-icon">P</div>
          <span class="nav__logo-text">The Pentaclub</span>
        </a>
        <div class="nav__links" id="navLinks">

class CardsPageComponent extends Component {

  constructor(container, collection, events) {
    super(container);
    this.#collection = collection;
    this.#events = events;
  }
  render() {
    return `
      <div class="section" style="padding-top:32px">
        <div class="section__header">
          <div class="section__label">Collection</div>
          <h2 class="section__title">All Cards</h2>
          <p class="section__desc">Browse the complete Riftbound card collection. Filter by rarity or search by name.</p>
        </div>
        <div class="cards-toolbar">
          <div style="position:relative;flex:1;min-width:200px">
            <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.4" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input class="cards-toolbar__search" id="cardSearch" type="text" placeholder="Search cards...">
          </div>
          <button class="filter-btn active" data-rarity="all">All</button>
          <button class="filter-btn" data-rarity="legendary">Legendary</button>
          <button class="filter-btn" data-rarity="epic">Epic</button>
          <button class="filter-btn" data-rarity="rare">Rare</button>
          <button class="filter-btn" data-rarity="common">Common</button>
        </div>
        <div class="card-showcase" id="cardsGrid"></div>
      </div>
    `;
  }
  afterMount() {
    this.#renderGrid();
    document.getElementById('cardSearch')?.addEventListener('input', (e) => {
      this.#searchQuery = e.target.value;
      this.#renderGrid();
    });
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.#activeRarity = btn.dataset.rarity;
        this.#renderGrid();
      });
    });
  }
  #renderGrid() {
    let cards = this.#collection.filterByRarity(this.#activeRarity);
    if (this.#searchQuery) {
      const q = this.#searchQuery.toLowerCase();
      cards = cards.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.type.toLowerCase().includes(q)
      );
    }
    const grid = document.getElementById('cardsGrid');
    if (!grid) return;
    if (cards.length === 0) {
      grid.innerHTML = '<div class="empty-state">No cards found matching your criteria.</div>';
      return;
    }
    grid.innerHTML = cards.map((card, i) => `
      <div class="tcg-card stagger-in" style="transition-delay:${Math.min(i * 0.04, 0.5)}s" data-card-id="${card.id}">
        <div class="tcg-card__art">
          <div class="tcg-card__art-bg" style="width:100%;height:100%;background:${card.artGradient}"></div>
          <span class="tcg-card__rarity ${card.rarityClass}">${card.rarity}</span>
          <span class="tcg-card__mana-cost">${card.manaCost}</span>
        </div>
        <div class="tcg-card__info">
          <div class="tcg-card__name">${card.name}</div>
          <div class="tcg-card__type">${card.type} &mdash; ${card.set}</div>
          <div class="tcg-card__stats-row">
            <span class="tcg-card__stat tcg-card__stat--atk">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M14.7 2.3a1 1 0 0 0-1.4 0l-4.6 4.6L6 4.2a1 1 0 0 0-1.4 0L2.3 6.5a1 1 0 0 0 0 1.4L5 10.6l-2.3 2.3a1 1 0 0 0 0 1.4l6 6a1 1 0 0 0 1.4 0l2.3-2.3 2.7 2.7a1 1 0 0 0 1.4 0l2.3-2.3a1 1 0 0 0 0-1.4L16.1 14.3l4.6-4.6a1 1 0 0 0 0-1.4l-6-6z"/></svg>
              ${card.attack}
            </span>
            <span class="tcg-card__stat tcg-card__stat--def">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
              ${card.defense}
            </span>
          </div>
        </div>
      </div>
    `).join('');
    requestAnimationFrame(() => {
      grid.querySelectorAll('.stagger-in').forEach(el => el.classList.add('visible'));
    });
  }
}

// ---------- INTERSECTION OBSERVER ----------

class ScrollAnimator {
  #observer;
  constructor() {
    this.#observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      },
      { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
    );
  }
  observe() {
    document.querySelectorAll('.stagger-in').forEach(el => {
      this.#observer.observe(el);
    });
  }
}

// ---------- APP CONTROLLER ----------

class App {
  #root;
  #router;
  #events;
  #collection;
  #nav;
  #scrollAnimator;

  constructor(rootId) {
    this.#root = document.getElementById(rootId);
    this.#events = new EventEmitter();
    this.#collection = new CardCollection(createSampleCards());
    this.#scrollAnimator = new ScrollAnimator();
    this.#init();
  }

  #init() {
    // Build skeleton
    this.#root.innerHTML = `
      <div class="bg-mesh"></div>
      <div class="grid-overlay"></div>
      <div id="navMount"></div>
      <div id="page-home" class="page"></div>
      <div id="page-cards" class="page"></div>
      <div id="page-about" class="page"></div>
      <div id="footerMount"></div>
    `;

    // Mount nav & footer
    this.#nav = new NavComponent(document.getElementById('navMount'), null);
    this.#nav.mount();
    new FooterComponent(document.getElementById('footerMount')).mount();

    // Router
    this.#router = new Router((route) => this.#onNavigate(route));
    this.#router
      .register('/', () => this.#showHome())
      .register('/cards', () => this.#showCards())
      .register('/about', () => this.#showAbout())
      .start();
  }

  #onNavigate(route) {
    this.#nav.updateActive(route);
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  #showHome() {
    const page = document.getElementById('page-home');
    const heroEl = document.createElement('div');
    const statsEl = document.createElement('div');
    const featuresEl = document.createElement('div');
    const cardsEl = document.createElement('div');
    const ctaEl = document.createElement('div');
    page.innerHTML = '';
    page.append(heroEl, statsEl, featuresEl, cardsEl, ctaEl);

    new HeroComponent(heroEl).mount();
    new StatsComponent(statsEl, [
      { value: '500+', label: 'Unique Cards' },
      { value: '7', label: 'Realms' },
      { value: '50K+', label: 'Players' },
      { value: '4', label: 'Rarities' },
    ]).mount();
    new FeaturesComponent(featuresEl, [
      { title: 'Collect & Trade', desc: 'Build your portfolio with cards from across the seven realms.' },
      { title: 'Strategic Battles', desc: 'Challenge opponents in deep, tactical duels. Every card matters. Every decision shapes the outcome.' },
      { title: 'Live Pricing', desc: 'Real-time market data on every card. Track your collection value and spot opportunities before anyone else.' },
      { title: 'Deck Builder', desc: 'Craft the perfect deck with our intelligent builder. Analyze synergies, mana curves, and win rates.' },
      { title: 'Seasonal Events', desc: 'Compete in limited-time events with exclusive card rewards. New challenges every season.' },
      { title: 'Community First', desc: 'Join a passionate community of collectors and competitors. Tournaments, forums, and more.' },
    ]).mount();
    new CardGridComponent(cardsEl, this.#collection, this.#events).mount();
    new CTAComponent(ctaEl).mount();

    page.classList.add('active');
    requestAnimationFrame(() => this.#scrollAnimator.observe());
  }

  #showCards() {
    const page = document.getElementById('page-cards');
    new CardsPageComponent(page, this.#collection, this.#events).mount();
    page.classList.add('active');
    requestAnimationFrame(() => this.#scrollAnimator.observe());
  }

  #showAbout() {
    const page = document.getElementById('page-about');
    new AboutPageComponent(page).mount();
    page.classList.add('active');
    requestAnimationFrame(() => this.#scrollAnimator.observe());
  }
}

// ---------- BOOT ----------
new App('app');
</script>
</body>
